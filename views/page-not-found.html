<!DOCTYPE html>
<html lang='en'>
  <head>
    <title>McDazzzled</title>
    <meta name='description' content="Personal Website for Breaden Sowinski (McDazzzled)" />
    <meta name='author' content="Braeden Sowinski" />
    <meta name='keywords' content="Braeden Sowinski, McDazzzled" />
    <meta property="og:image" content="https://www.mcdazzzled.com/static/images/preview.png" />
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel="icon" type="image/png" href="/static/images/profile.ico"/>

    <!-- Load CSS -->  
  <link type="text/css" rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="js-stop-transition">

    <!-- Code of Braeden Sowinski | https://github.com/McDazzzled -->

    <!--

      Why are you looking at my code here?
      If you want to look at the code. Dont Inspect.
      Visit the github here -> https://github.com/McDazzzled/PersonalWebsite

    -->

    <header class=header>
      <nav class=nav>
        <div class=logo>
          <a href="/" title="McDazzzled (Alt + H)">
            <img src=/static/images/profile.png alt=logo style="border-radius:50%;" aria-label=logo height=32>McDazzzled
          </a>
          <span class="logo-switches">
            <button id=theme-toggle accesskey=t title="(Alt + T)">
              <svg id="sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentcolor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
              </svg>
              <svg id="moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentcolor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            </button>
          </span>
        </div>
        <ul id=menu>
          <li>
            <a href="/" title="Home">
              <span class=active>Home</span>
            </a>
          </li>
          <li>
            <a href="/about" title="about">
              <span>About</span>
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- 404 Error Message -->
    <div id="notfound">
      <div class="notfound">
        <div class="notfound-404">
          <h1>404</h1>
          <h2>Page not found</h2>
        </div>
        <a href="/">Homepage</a>
      </div>
    </div>
    
    <!-- Disable transitions on webpage load -->
    <script>document.body.classList.remove('js-stop-transition')</script>

    <!-- Change Theme Scripts -->
    <script type="text/javascript">
      document.getElementById("theme-toggle").addEventListener("click", () => {
        document.body.className.includes("dark")?(document.body.classList.remove('dark'),
        localStorage.setItem("pref-theme",'light')):(document.body.classList.add('dark'),
        localStorage.setItem("pref-theme",'dark')),
        "dark"==sessionStorage.getItem("theme")?sessionStorage.setItem("theme","light"):sessionStorage.setItem("theme","dark");
      });
  </script>
  <script>
    // If storage is supported set theme to dark by default
    if (typeof(Storage) !== "undefined") {
      if (sessionStorage.getItem("theme")==null||sessionStorage.getItem("theme")==undefined) sessionStorage.setItem("theme", "dark");
      if (sessionStorage.getItem("theme")=='light') {
        document.body.className.includes("dark")?(document.body.classList.remove('dark'),
        localStorage.setItem("pref-theme",'light')):(document.body.classList.add('dark'),
        localStorage.setItem("pref-theme",'dark'));
      }
    }
  </script>
  </body>
</html>
